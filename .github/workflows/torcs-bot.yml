name: TORCS Bot Run

on:
  push:
    branches: [pipeline-that-runs-bot]
  workflow_dispatch:

jobs:
  run-torcs-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull TORCS image
        run: docker pull docker.io/johnsloe/torcs-competition:amd64

      - name: Run TORCS bot
        run: |
          docker run --rm \
            --user root \
            -v "${{ github.workspace }}:/workspace" \
            docker.io/johnsloe/torcs-competition:amd64 \
            bash /workspace/.github/scripts/run_torcs.sh \
            2>&1 | tee race_results.txt

      - name: Upload race results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: race-results
          path: race_results.txt
          retention-days: 30
